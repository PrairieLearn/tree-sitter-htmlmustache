name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false

jobs:
  # Only publish for parser releases (v*), not LSP releases (lsp-v*).
  # Allow manual dispatch (ref_name will be a branch or tag chosen by the operator).
  build_sdist:
    name: Build sdist
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          retention-days: 2

  build_wheels:
    name: Build wheels on ${{matrix.os}}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'v')
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-13       # x86_64
          - macos-14       # arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: native
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{matrix.os}}
          path: wheelhouse/*.whl
          retention-days: 2

  publish:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tree-sitter-htmlmustache/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - run: ls -l dist
      - uses: pypa/gh-action-pypi-publish@release/v1
